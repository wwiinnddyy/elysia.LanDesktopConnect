name: Release Elysia.LanDesktopConnect

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Committed three-part plugin version, for example 0.1.0"
        required: true
        type: string

env:
  DOTNET_VERSION: "10.0.x"
  BUN_VERSION: "1.3.14"
  LANMOUNTAIN_SDK_REF: "a858860b3feb006bb054bcd1f293df88dd86eb45"

permissions:
  contents: write

concurrency:
  group: elysia-landesktopconnect-release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Elysia.LanDesktopConnect

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: Elysia.LanDesktopConnect

      - name: Checkout production PluginSdk source
        uses: actions/checkout@v7
        with:
          repository: wwiinnddyy/LanMountainDesktop
          ref: ${{ env.LANMOUNTAIN_SDK_REF }}
          path: LanMountainDesktop

      - name: Checkout LanAirApp validator
        uses: actions/checkout@v7
        with:
          repository: wwiinnddyy/LanAirApp
          path: LanAirApp

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Resolve and verify release metadata
        id: metadata
        shell: pwsh
        run: |
          $requestedVersion = "${{ github.event.inputs.version }}".Trim()
          if ($requestedVersion.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $requestedVersion = $requestedVersion.Substring(1)
          }
          if ($requestedVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Release version must be a three-part version."
          }

          $manifest = Get-Content .\plugin.json -Encoding UTF8 -Raw | ConvertFrom-Json
          if ($manifest.version -ne $requestedVersion) {
            throw "Committed plugin.json version '$($manifest.version)' does not match requested '$requestedVersion'."
          }
          if ($manifest.apiVersion -ne "5.0.0") {
            throw "Release must target PluginSdk API 5.0.0."
          }

          $releaseTag = "v$requestedVersion"
          $existingTag = git ls-remote --tags origin "refs/tags/$releaseTag"
          if (-not [string]::IsNullOrWhiteSpace(($existingTag -join ""))) {
            throw "Tag '$releaseTag' already exists; release assets will not be overwritten."
          }

          $assetName = "$($manifest.id).$requestedVersion.laapp"
          "version=$requestedVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Initialize isolated PluginSdk 5 feed
        shell: pwsh
        run: .\scripts\Initialize-LocalPackageFeed.ps1 -LanMountainDesktopRoot ..\LanMountainDesktop

      - name: Restore gateway dependencies
        shell: pwsh
        working-directory: Elysia.LanDesktopConnect/elysia-gateway
        run: bun install --frozen-lockfile

      - name: Type-check gateway
        shell: pwsh
        working-directory: Elysia.LanDesktopConnect/elysia-gateway
        run: bun run typecheck

      - name: Smoke-test gateway transport
        shell: pwsh
        run: .\scripts\Test-GatewaySmoke.ps1

      - name: Validate committed metadata
        shell: pwsh
        run: .\scripts\Test-PluginConsistency.ps1

      - name: Restore plugin without shared cache
        shell: pwsh
        run: dotnet restore .\Elysia.LanDesktopConnect.csproj --force --no-cache -v minimal

      - name: Build plugin package
        shell: pwsh
        run: dotnet build .\Elysia.LanDesktopConnect.csproj -c Release --no-restore -v minimal

      - name: Generate market manifest v2
        shell: pwsh
        run: |
          .\scripts\New-MarketManifest.ps1 `
            -TemplatePath .\airappmarket-entry.template.json `
            -PackagePath ".\${{ steps.metadata.outputs.asset_name }}" `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "${{ steps.metadata.outputs.release_tag }}" `
            -OutputPath .\artifacts\market-manifest.json

      - name: Validate package and market metadata
        shell: pwsh
        run: |
          .\scripts\Test-PluginConsistency.ps1 `
            -PackagePath ".\${{ steps.metadata.outputs.asset_name }}" `
            -MarketManifestPath .\artifacts\market-manifest.json

          dotnet run --project ..\LanAirApp\airappmarket\tools\AirAppMarket.IndexBuilder -- `
            --validate-release-package ".\${{ steps.metadata.outputs.asset_name }}" `
            --market-manifest .\artifacts\market-manifest.json `
            --plugin-id Elysia.LanDesktopConnect

      - name: Generate checksum
        shell: pwsh
        run: |
          $assetName = "${{ steps.metadata.outputs.asset_name }}"
          $hash = (Get-FileHash -LiteralPath ".\$assetName" -Algorithm SHA256).Hash.ToLowerInvariant()
          [System.IO.File]::WriteAllText(
            ".\artifacts\sha256.txt",
            "$hash  $assetName`n",
            [System.Text.UTF8Encoding]::new($false))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Elysia.LanDesktopConnect ${{ steps.metadata.outputs.release_tag }}
          body: |
            ## Elysia.LanDesktopConnect ${{ steps.metadata.outputs.release_tag }}

            - Production LanMountainDesktop PluginSdk/API 5.0.0
            - Avalonia 12.1.0 and FluentAvalonia 3.0.1 compatibility
            - Correct named-pipe / Unix-socket bridge and localhost-only Elysia gateway
            - API 5 settings section, gateway status desktop component, and public IPC service
            - LanAirApp market-manifest schema 2.0.0

            Requirements: LanMountainDesktop 0.8.6+ and Bun.
          files: |
            Elysia.LanDesktopConnect/${{ steps.metadata.outputs.asset_name }}
            Elysia.LanDesktopConnect/artifacts/market-manifest.json
            Elysia.LanDesktopConnect/artifacts/sha256.txt
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
